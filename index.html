<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Anime Web Page</title>
</head>

<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-indigo-900 h-screen w-full text-white">
    <header class="flex items-center justify-between py-8 px-14">
        <div class="flex items-center gap-3">
            <img src="anime-away-face-svgrepo-com.svg" alt="website-logo" width="50px" height="50px">
            <p class="text-[20px]">Anime<span class="text-lime-500">NinJutsu</span></p>
        </div>
        <nav>
            <ul class="flex items-center justify-center gap-6">
                <li><a href="index.html"
                        class="px-3 py-2 rounded-md  hover:bg-blue-600 hover:text-white-900 transition-all duration-200 text-[20px]">Home</a>
                </li>
                <li><a href="#"
                        class="px-3 py-2 rounded-md hover:bg-blue-600 hover:text-white-900 transition-all duration-200 text-[20px]">Anime
                        Lists</a></li>
            </ul>
        </nav>
        <div class="flex items-center justify-center gap-8">
            <div class="relative w-full max-w-md">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" name="search" id="search-input" placeholder="Search"
                    class="block w-full rounded-lg border border-gray-300 bg-white py-2.5 pl-10 pr-4 text-sm text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <button class="bg-blue-500 px-4 py-2 rounded-lg hover:bg-blue-600" id="searchButton">Search</button>
        </div>
    </header>
    <main class="main-content">
        <div class="latest-release">
            <h2 class="text-[32px]">Latest Release</h2>
            <div id="display-container"></div>
        </div>
        <div class="Trending">
            <h2 class="text-[32px]">Trending</h2>
            <div class="" id="trending-box"></div>
        </div>
        <div class="favourites">
            <h2 class="text-[32px]">Favourites</h2>
            <div id="favourite-box"></div>
        </div>
    </main>
    <footer></footer>
</body>

</html>
